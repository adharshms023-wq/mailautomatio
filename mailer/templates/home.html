<!DOCTYPE html>
<html>
<head>
<title>MailForge AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e0e7ff);
}

/* HEADER */
.header {
    background: #111827;
    color: white;
    padding: 18px 25px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    gap: 20px;
    padding: 25px;
    height: calc(100vh - 70px);
    box-sizing: border-box;
}

/* LEFT PANEL */
.left {
    width: 38%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    width: 62%;
    background: white;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* INPUTS */
label {
    font-size: 13px;
    color: #374151;
    font-weight: 600;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 16px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

input:focus, textarea:focus, select:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button[name="action"][value="generate"] {
    background: #4f46e5;
    color: white;
    margin-bottom: 10px;
}

button[name="action"][value="generate"]:hover {
    background: #4338ca;
}

button[name="action"][value="send"] {
    background: #10b981;
    color: white;
}

button[name="action"][value="send"]:hover {
    background: #059669;
}

/* PREVIEW */
.preview-box {
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* EMPTY STATE */
.empty {
    color: #9ca3af;
    text-align: center;
    margin-top: 40%;
}

</style>
</head>

<body>

<div class="header">
    🚀 MailForge AI — Smart Email Generator
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<form method="POST">
{% csrf_token %}

<label>Campaign Idea</label>
<textarea name="content" placeholder="e.g. Launch AI course for students"></textarea>

<label>Tone</label>
<select name="tone">
    <option value="professional">Professional</option>
    <option value="friendly">Friendly</option>
    <option value="marketing">Marketing</option>
</select>

<label>Style</label>
<select name="style">
    <option value="startup">Startup</option>
    <option value="corporate">Corporate</option>
    <option value="event">Event</option>
</select>

<label>Subject (manual override)</label>
<input type="text" name="subject">

<label>Recipients</label>
<textarea name="emails" placeholder="email1@gmail.com"></textarea>

<button name="action" value="generate">
✨ Generate AI Email
</button>

<button name="action" value="send">
🚀 Send Email
</button>

</form>

</div>

<!-- RIGHT -->
<div class="right">

<h3 style="margin-top:0;">Live Preview</h3>

<div class="preview-box">

{% if preview %}
<iframe srcdoc="{{ preview|safe }}"></iframe>
{% else %}
<div class="empty">
    No preview yet<br>
    Generate an AI email to see it here
</div>
{% endif %}

</div>

</div>

</div>

</body>
</html>
